<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/common.css" />
    <link rel="stylesheet" href="/src/styles/quick-follow.css" />
    <title>Quick Follow</title>
  </head>
  <body>
    <main class="quick-follow" id="app">
      <section class="scanner" aria-labelledby="scanner-title">
        <h1 class="scanner__title" id="scanner-title">Quick Follow</h1>
        <video class="scanner__video" id="camera-video" autoplay muted playsinline></video>
        <figure class="scanner__preview" id="debug-preview" hidden>
          <span class="scanner__preview-frame" id="debug-preview-frame">
            <img class="scanner__preview-image" id="debug-preview-image" alt="アップロード画像" />
            <span class="scanner__preview-overlay" id="debug-preview-overlay" aria-hidden="true"></span>
          </span>
        </figure>
        <img class="scanner__mock-overlay" id="camera-mock-overlay" src="/device-mock-x-profile.webp" alt="" aria-hidden="true" />
        <p class="scanner__status" id="status-text" role="status">カメラを開始してください</p>
      </section>

      <section class="control" aria-label="操作">
        <button class="control__button" id="start-button" type="button">
          <svg class="control__icon" aria-hidden="true"><use href="/icons.svg#camera-icon"></use></svg>
          開始
        </button>
        <button class="control__button" id="stop-button" type="button" disabled>
          <svg class="control__icon" aria-hidden="true"><use href="/icons.svg#stop-icon"></use></svg>
          停止
        </button>
        <label class="control__file" for="upload-input">
          <svg class="control__icon" aria-hidden="true"><use href="/icons.svg#upload-icon"></use></svg>
          画像
        </label>
        <input class="control__input" id="upload-input" type="file" accept="image/*" />
        <a class="control__link" id="open-link" href="https://x.com/" hidden rel="noopener">
          <svg class="control__icon" aria-hidden="true"><use href="/icons.svg#x-icon"></use></svg>
          開く
        </a>
      </section>

      <dialog class="start-dialog" id="start-dialog" aria-labelledby="start-title">
        <section class="start-dialog__body">
          <h2 class="start-dialog__title" id="start-title">カメラを開始してください</h2>
          <button class="start-dialog__button" id="start-dialog-button" type="button">
            <svg class="control__icon" aria-hidden="true"><use href="/icons.svg#camera-icon"></use></svg>
            開始
          </button>
        </section>
      </dialog>

      <dialog class="result-dialog" id="result-dialog" aria-labelledby="result-title">
        <form class="result-dialog__body" method="dialog">
          <h2 class="result-dialog__title" id="result-title">検出しました</h2>
          <p class="result-dialog__handle" id="result-handle">@</p>
          <div class="result-dialog__actions">
            <button class="result-dialog__button" id="result-close-button" type="button">
              <svg class="control__icon" aria-hidden="true"><use href="/icons.svg#stop-icon"></use></svg>
              閉じる
            </button>
            <a class="result-dialog__link" id="result-open-link" href="https://x.com/" rel="noopener">
              <svg class="control__icon" aria-hidden="true"><use href="/icons.svg#x-icon"></use></svg>
              開く
            </a>
          </div>
        </form>
      </dialog>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
